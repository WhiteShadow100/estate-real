services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: techkraft_db
    ports:
      - "5432:5432"

  backend:
    build: ./api
    image: api-image
    container_name: api
    # restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./ui
    container_name: ui
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend